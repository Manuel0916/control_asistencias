# =====================
# ? SPRING BOOT GENERAL
# =====================
spring.application.name=control-asistencia

# =====================
# ? MySQL CONFIGURACIÓN
# =====================
spring.datasource.url=jdbc:mysql://localhost:3306/control_asistencia
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA (solo se aplica a MySQL, no a Mongo)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# =====================
# ? MongoDB CONFIGURACIÓN
# =====================
spring.data.mongodb.uri=mongodb://localhost:27017/control_asistencia_mongo

# =====================
# ? SPRING SECURITY
# =====================
spring.security.user.name=disabled
spring.security.user.password=disabled

# =====================
# ?? THYMELEAF
# =====================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.check-template-location=true

# =====================
# ? MULTIPART / SUBIDA DE ARCHIVOS
# =====================
# Tamańo máximo por archivo (ajusta según necesites)
spring.servlet.multipart.max-file-size=50MB

# Tamańo máximo total de la solicitud
spring.servlet.multipart.max-request-size=50MB
