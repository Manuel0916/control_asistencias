# =====================
# SPRING BOOT GENERAL
# =====================
spring.application.name=control-asistencia

# =====================
# MYSQL ? Railway (variables de entorno)
# =====================
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================
# MONGODB ? desactivado en producciˇn
# =====================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration

# =====================
# JPA
# =====================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# =====================
# IA ? desactivada en producciˇn (Ollama no disponible)
# =====================
spring.ai.ollama.base-url=${OLLAMA_URL:http://localhost:11434}
spring.ai.ollama.chat.options.model=llama3.2
spring.ai.ollama.chat.options.temperature=0.2
spring.ai.ollama.chat.options.timeout=90s
spring.ai.mcp.client.enabled=false

app.ai.negacion=Lo siento, no puedo responder esa pregunta.

# =====================
# SPRING SECURITY
# =====================
spring.security.user.name=admin
spring.security.user.password=admin

# =====================
# THYMELEAF
# =====================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.check-template-location=true

# =====================
# MULTIPART
# =====================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =====================
# PUERTO (Railway lo asigna automßticamente)
# =====================
server.port=${PORT:8080}