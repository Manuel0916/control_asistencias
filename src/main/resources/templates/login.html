<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsistControl | Iniciar Sesión</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4F7BFF;
            --primary-dark: #3A5FDB;
            --primary-light: #EAF0FF;
            --secondary: #8B5CF6;
            --accent: #10B981;
            --light-bg: #FFFFFF;
            --dark-bg: #0F172A;
            --text-dark: #1E293B;
            --text-muted: #64748B;
            --card-shadow: 0 20px 40px -15px rgba(79, 123, 255, 0.15);
            --card-shadow-hover: 0 30px 60px -20px rgba(79, 123, 255, 0.25);
            --border-light: #E2E8F0;
            --gradient-primary: linear-gradient(135deg, var(--primary), var(--secondary));
            --gradient-dark: linear-gradient(135deg, var(--dark-bg), #1E293B);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(45deg, #f8fafc 0%, #f1f5f9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Fondo animado IDÉNTICO a la landing page */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            opacity: 0.1;
            border-radius: 50%;
            background: var(--gradient-primary);
            animation: float 20s infinite linear;
        }

        .shape:nth-child(1) {
            width: 300px;
            height: 300px;
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 200px;
            height: 200px;
            top: 60%;
            right: 10%;
            animation-delay: -5s;
            animation-duration: 25s;
        }

        .shape:nth-child(3) {
            width: 150px;
            height: 150px;
            bottom: 20%;
            left: 20%;
            animation-delay: -10s;
            animation-duration: 30s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
            }
            33% {
                transform: translateY(-30px) rotate(120deg);
            }
            66% {
                transform: translateY(30px) rotate(240deg);
            }
        }

        /* Container principal */
        .login-container {
            width: 100%;
            max-width: 440px;
            animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Tarjeta de login - Mismo estilo que landing */
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            transition: all 0.4s ease;
            border: 1px solid var(--border-light);
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--card-shadow-hover);
        }

        /* Header IDÉNTICO al navbar de landing */
        .login-header {
            background: var(--gradient-primary);
            color: white;
            text-align: center;
            padding: 3rem 2rem;
            position: relative;
            overflow: hidden;
        }

        .brand-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 1.5rem;
        }

        .brand-logo {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .brand-logo img {
            width: 35px;
            height: 35px;
            border-radius: 8px;
        }

        .brand-text {
            font-weight: 800;
            font-size: 2rem;
            background: white;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-header h1 {
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            opacity: 0.9;
            font-weight: 500;
            font-size: 1.1rem;
        }

        /* Body del formulario */
        .login-body {
            padding: 2.5rem;
        }

        /* Estilos de formulario COHERENTES con landing */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            display: block;
        }

        .input-container {
            position: relative;
        }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 12px 16px;
            border: 2px solid var(--border-light);
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
            width: 100%;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 123, 255, 0.1);
            transform: translateY(-2px);
        }

        .input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        /* Botón IDÉNTICO a la landing page */
        .btn-login {
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(79, 123, 255, 0.3);
            position: relative;
            overflow: hidden;
            width: 100%;
            margin-top: 1rem;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(79, 123, 255, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.7;
            transform: none;
            box-shadow: none;
        }

        /* Alertas - Mismo estilo que features */
        .alert {
            border-radius: 12px;
            border: none;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        .alert-success {
            background: #D1FAE5;
            color: #065F46;
            border-left: 4px solid #10B981;
        }

        .alert-danger {
            background: #FEE2E2;
            color: #991B1B;
            border-left: 4px solid #DC2626;
        }

        #alertaEstado {
            transition: all 0.3s ease;
        }

        /* Spinner */
        .spinner-border {
            width: 1rem;
            height: 1rem;
            border-width: 2px;
        }

        /* Links - Mismo estilo que landing */
        .link-forgot {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        .link-forgot:hover {
            color: var(--primary-dark);
            transform: translateX(5px);
        }

        /* Footer - Mismo estilo que landing */
        .login-footer {
            text-align: center;
            padding: 1.5rem 2.5rem;
            border-top: 1px solid var(--border-light);
            background: #F8FAFC;
        }

        .login-footer p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-body {
                padding: 2rem 1.5rem;
            }

            .login-header {
                padding: 2rem 1.5rem;
            }

            .login-footer {
                padding: 1.5rem;
            }

            .brand-text {
                font-size: 1.7rem;
            }
        }

        /* Estados de validación */
        .is-invalid {
            border-color: #dc3545 !important;
            box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.1) !important;
        }

        .is-valid {
            border-color: #10B981 !important;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1) !important;
        }
    </style>
</head>

<body>
<!-- Fondo animado IDÉNTICO a landing page -->
<div class="background-animation"></div>
<div class="floating-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
</div>

<div class="login-container">
    <div class="login-card">
        <!-- Header - Mismo estilo que navbar landing -->
        <div class="login-header">
            <div class="brand-container">
                <div class="brand-logo">
                    <img src="static/imagenes/logoappM.jpg"
                         alt="Logo AsistControl"
                         onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzUiIGhlaWdodD0iMzUiIHZpZXdCb3g9IjAgMCAzNSAzNSIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHJlY3Qgd2lkdGg9IjM1IiBoZWlnaHQ9IjM1IiByeD0iOCIgZmlsbD0id2hpdGUiLz4KPHRleHQgeD0iMTcuNSIgeT0iMjIiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxMiIgZmlsbD0iIzRGN0JGRiIgdGV4dC1hbmNob3I9Im1pZGRsZSI+QUM8L3RleHQ+Cjwvc3ZnPgo='">
                </div>
                <div class="brand-text">AsistControl</div>
            </div>
            <h1>Iniciar Sesión</h1>
            <p>Accede a tu cuenta para continuar</p>
        </div>

        <!-- Body del formulario -->
        <div class="login-body">
            <!-- Alertas del sistema -->
            <div th:if="${param.logout}" class="alert alert-success">
                <i class="bi bi-check-circle-fill me-2"></i>Has cerrado sesión correctamente.
            </div>
            <div th:if="${param.error}" class="alert alert-danger">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>Usuario o contraseña incorrectos.
            </div>
            <div th:if="${param.registroExitoso}" class="alert alert-success">
                <i class="bi bi-check-circle-fill me-2"></i>Registro exitoso. Ahora puedes iniciar sesión.
            </div>

            <!-- Alerta dinámica (oculta por defecto) -->
            <div id="alertaEstado" class="alert alert-danger d-none"></div>

            <!-- Formulario - SOLO username y password -->
            <form id="formLogin" th:action="@{/login}" method="post" novalidate>
                <!-- Usuario (puede ser username o email - Spring Security lo maneja) -->
                <div class="form-group">
                    <label for="username" class="form-label">Usuario o Email</label>
                    <div class="input-container">
                        <input type="text"
                               id="username"
                               name="username"
                               class="form-control"
                               placeholder="Ingresa tu usuario o email"
                               required
                               autocomplete="username">
                        <i class="bi bi-person input-icon"></i>
                    </div>
                </div>

                <!-- Contraseña -->
                <div class="form-group">
                    <label for="password" class="form-label">Contraseña</label>
                    <div class="input-container">
                        <input type="password"
                               id="password"
                               name="password"
                               class="form-control"
                               placeholder="••••••••"
                               required
                               autocomplete="current-password">
                        <i class="bi bi-lock input-icon"></i>
                    </div>
                </div>

                <!-- Botón de login -->
                <button type="submit" id="submitBtn" class="btn btn-login">
                    <span id="submitText">Iniciar Sesión</span>
                    <div id="submitSpinner" class="spinner-border spinner-border-sm text-light ms-2 d-none" role="status"></div>
                </button>
            </form>

            <!-- Link olvidó contraseña -->
            <div class="text-center">
                <a th:href="@{/forgot-password}" class="link-forgot">
                    <i class="bi bi-key"></i>¿Olvidaste tu contraseña?
                </a>
            </div>
        </div>

        <!-- Footer -->
        <div class="login-footer">
            <p>© 2025 AsistControl - Sistema Inteligente de Gestión Educativa</p>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Script simplificado -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const formLogin = document.getElementById('formLogin');
        const alertaEstado = document.getElementById('alertaEstado');
        const submitBtn = document.getElementById('submitBtn');
        const submitSpinner = document.getElementById('submitSpinner');
        const submitText = document.getElementById('submitText');

        // Validación en tiempo real (opcional, mejora UX)
        const inputs = formLogin.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('blur', function() {
                validateField(this);
            });

            input.addEventListener('input', function() {
                if (this.classList.contains('is-invalid')) {
                    validateField(this);
                }
            });
        });

        formLogin.addEventListener('submit', function(e) {
            e.preventDefault();
            alertaEstado.classList.add('d-none');

            // Validar que los campos no estén vacíos
            let isValid = true;
            inputs.forEach(input => {
                if (!validateField(input)) {
                    isValid = false;
                }
            });

            if (!isValid) {
                showAlert("Por favor completa todos los campos requeridos.", "danger");
                return;
            }

            // Enviar el formulario directamente
            setLoading(true);
            formLogin.submit();
        });

        function validateField(field) {
            const value = field.value.trim();

            if (field.hasAttribute('required') && !value) {
                field.classList.add('is-invalid');
                field.classList.remove('is-valid');
                return false;
            }

            field.classList.remove('is-invalid');
            field.classList.add('is-valid');
            return true;
        }

        function setLoading(state) {
            if (state) {
                submitBtn.disabled = true;
                submitSpinner.classList.remove('d-none');
                submitText.textContent = 'Iniciando sesión...';
            } else {
                submitBtn.disabled = false;
                submitSpinner.classList.add('d-none');
                submitText.textContent = 'Iniciar Sesión';
            }
        }

        function showAlert(msg, type) {
            alertaEstado.innerHTML = `<i class="bi bi-${type === 'danger' ? 'exclamation-triangle' : 'info-circle'}-fill me-2"></i>${msg}`;
            alertaEstado.className = `alert alert-${type}`;
            alertaEstado.classList.remove('d-none');

            // Scroll suave a la alerta
            alertaEstado.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    });
</script>
</body>
</html>
