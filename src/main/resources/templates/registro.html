<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario - AsistControl</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4F7BFF;
            --primary-dark: #3A5FDB;
            --primary-light: #EAF0FF;
            --secondary: #8B5CF6;
            --accent: #10B981;
            --accent-dark: #059669;
            --light-bg: #FFFFFF;
            --dark-bg: #0F172A;
            --text-dark: #1E293B;
            --text-muted: #64748B;
            --card-shadow: 0 20px 40px -15px rgba(79, 123, 255, 0.15);
            --card-shadow-hover: 0 30px 60px -20px rgba(79, 123, 255, 0.25);
            --border-light: #E2E8F0;
            --gradient-primary: linear-gradient(135deg, var(--primary), var(--secondary));
            --gradient-dark: linear-gradient(135deg, var(--dark-bg), #1E293B);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(45deg, #f8fafc 0%, #f1f5f9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            opacity: 0.1;
            border-radius: 50%;
            background: var(--gradient-primary);
            animation: float 20s infinite linear;
        }

        .shape:nth-child(1) {
            width: 300px;
            height: 300px;
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 200px;
            height: 200px;
            top: 60%;
            right: 10%;
            animation-delay: -5s;
            animation-duration: 25s;
        }

        .shape:nth-child(3) {
            width: 150px;
            height: 150px;
            bottom: 20%;
            left: 20%;
            animation-delay: -10s;
            animation-duration: 30s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
            }
            33% {
                transform: translateY(-30px) rotate(120deg);
            }
            66% {
                transform: translateY(30px) rotate(240deg);
            }
        }

        .register-container {
            width: 100%;
            max-width: 480px;
            animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .register-card {
            background: white;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            transition: all 0.4s ease;
            border: 1px solid var(--border-light);
        }

        .register-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--card-shadow-hover);
        }

        .register-header {
            background: var(--gradient-primary);
            color: white;
            text-align: center;
            padding: 2.5rem 2rem;
            position: relative;
            overflow: hidden;
        }

        .brand-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 1.5rem;
        }

        .brand-logo {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .brand-logo img {
            width: 35px;
            height: 35px;
            border-radius: 8px;
        }

        .brand-text {
            font-weight: 800;
            font-size: 2rem;
            background: white;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .register-header h1 {
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .register-header p {
            opacity: 0.9;
            font-weight: 500;
            font-size: 1.1rem;
        }

        .register-body {
            padding: 2.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            display: block;
        }

        .input-container {
            position: relative;
        }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 12px 16px;
            border: 2px solid var(--border-light);
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
            width: 100%;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 123, 255, 0.1);
            transform: translateY(-2px);
        }

        .input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .btn-register {
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(79, 123, 255, 0.3);
            position: relative;
            overflow: hidden;
            width: 100%;
            margin-top: 1rem;
        }

        .btn-register::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-register:hover::before {
            left: 100%;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(79, 123, 255, 0.4);
        }

        .btn-login {
            background: transparent;
            color: var(--text-dark);
            border: 2px solid var(--border-light);
            border-radius: 12px;
            padding: 14px 20px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 1rem;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .btn-login:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .password-strength {
            margin-top: 0.5rem;
        }

        .strength-bar {
            height: 4px;
            border-radius: 2px;
            background: #E2E8F0;
            overflow: hidden;
            margin-bottom: 0.25rem;
        }

        .strength-fill {
            height: 100%;
            border-radius: 2px;
            transition: all 0.3s ease;
            width: 0%;
        }

        .strength-text {
            font-size: 0.8rem;
            font-weight: 500;
        }

        .strength-weak { background: #EF4444; width: 25%; }
        .strength-medium { background: #F59E0B; width: 50%; }
        .strength-strong { background: #10B981; width: 75%; }
        .strength-very-strong { background: #059669; width: 100%; }

        .register-footer {
            text-align: center;
            padding: 1.5rem 2.5rem;
            border-top: 1px solid var(--border-light);
            background: #F8FAFC;
        }

        .register-footer p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0;
            font-weight: 500;
        }

        .is-invalid {
            border-color: #dc3545 !important;
            box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.1) !important;
        }

        .is-valid {
            border-color: #10B981 !important;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1) !important;
        }

        @media (max-width: 480px) {
            .register-body {
                padding: 2rem 1.5rem;
            }

            .register-header {
                padding: 2rem 1.5rem;
            }

            .register-footer {
                padding: 1.5rem;
            }

            .brand-text {
                font-size: 1.7rem;
            }
        }

        .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
<div class="background-animation"></div>
<div class="floating-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
</div>

<div class="register-container">
    <div class="register-card">
        <div class="register-header">
            <div class="brand-container">
                <div class="brand-logo">
                    <img src="static/imagenes/logoappM.jpg"
                         alt="Logo AsistControl"
                         onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzUiIGhlaWdodD0iMzUiIHZpZXdCb3g9IjAgMCAzNSAzNSIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHJlY3Qgd2lkdGg9IjM1IiBoZWlnaHQ9IjM1IiByeD0iOCIgZmlsbD0id2hpdGUiLz4KPHRleHQgeD0iMTcuNSIgeT0iMjIiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxMiIgZmlsbD0iIzRGN0JGRiIgdGV4dC1hbmNob3I9Im1pZGRsZSI+QUM8L3RleHQ+Cjwvc3ZnPgo='">
                </div>
                <div class="brand-text">AsistControl</div>
            </div>
            <h1>Registro de Usuario</h1>
            <p>Crea una nueva cuenta en el sistema</p>
        </div>

        <div class="register-body">
            <div id="alert-container"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="username" class="form-label">Usuario</label>
                    <div class="input-container">
                        <input type="text"
                               id="username"
                               name="username"
                               class="form-control"
                               placeholder="Ingresa tu usuario"
                               required
                               autocomplete="username">
                        <i class="bi bi-person input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <div class="input-container">
                        <input type="email"
                               id="email"
                               name="email"
                               class="form-control"
                               placeholder="Ingresa tu correo electrónico"
                               required
                               autocomplete="email">
                        <i class="bi bi-envelope input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Contraseña</label>
                    <div class="input-container">
                        <input type="password"
                               id="password"
                               name="password"
                               class="form-control"
                               placeholder="Crea una contraseña segura"
                               required
                               autocomplete="new-password">
                        <i class="bi bi-lock input-icon"></i>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="passwordStrength"></div>
                        </div>
                        <div class="strength-text" id="passwordText">Seguridad de la contraseña</div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="rolNombre" class="form-label">Selecciona un Rol</label>
                    <div class="input-container">
                        <select id="rolNombre" name="rolNombre" class="form-select" required>
                            <option value="">Elige un rol...</option>
                            <option value="ESTUDIANTE">Estudiante</option>
                            <option value="ADMIN">Administrador</option>
                            <option value="COORDINADOR">Coordinador</option>
                        </select>
                        <i class="bi bi-person-badge input-icon"></i>
                    </div>
                </div>

                <button type="submit" class="btn-register" id="submitBtn">
                    <i class="bi bi-person-plus me-2"></i>
                    <span id="submitText">Crear Cuenta</span>
                    <div id="submitSpinner" class="spinner-border spinner-border-sm text-light ms-2 d-none" role="status"></div>
                </button>
            </form>

            <a href="/login" class="btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>
                ¿Ya tienes cuenta? Inicia Sesión
            </a>
        </div>

        <div class="register-footer">
            <p>© 2025 AsistControl - Sistema Inteligente de Gestión Educativa</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('registerForm');
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('passwordStrength');
        const strengthText = document.getElementById('passwordText');
        const submitBtn = document.getElementById('submitBtn');
        const submitText = document.getElementById('submitText');
        const submitSpinner = document.getElementById('submitSpinner');

        // Validación de fortaleza de contraseña
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let text = '';
            let barClass = '';

            if (password.length > 0) {
                if (password.length < 6) {
                    text = 'Débil';
                    barClass = 'strength-weak';
                } else if (password.length < 8) {
                    text = 'Moderada';
                    barClass = 'strength-medium';
                } else if (/[A-Z]/.test(password) && /[0-9]/.test(password)) {
                    text = 'Fuerte';
                    barClass = 'strength-strong';
                } else {
                    text = 'Moderada';
                    barClass = 'strength-medium';
                }

                if (password.length >= 10 && /[A-Z]/.test(password) && /[0-9]/.test(password) && /[^A-Za-z0-9]/.test(password)) {
                    text = 'Muy Fuerte';
                    barClass = 'strength-very-strong';
                }
            }

            strengthBar.className = 'strength-fill ' + barClass;
            strengthText.textContent = text || 'Seguridad de la contraseña';
        });

        // Validación en tiempo real
        const inputs = form.querySelectorAll('input, select');
        inputs.forEach(input => {
            input.addEventListener('blur', function() {
                validateField(this);
            });

            input.addEventListener('input', function() {
                if (this.classList.contains('is-invalid')) {
                    validateField(this);
                }
            });
        });

        // ✅ CORREGIDO: Enviar al AuthController en lugar del API
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            let isValid = true;
            inputs.forEach(input => {
                if (!validateField(input)) {
                    isValid = false;
                }
            });

            if (!isValid) {
                showAlert('Por favor completa todos los campos correctamente.', 'error');
                return;
            }

            setLoading(true);

            try {
                const formData = {
                    username: document.getElementById('username').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    password: document.getElementById('password').value,
                    rolNombre: document.getElementById('rolNombre').value
                };

                console.log('Enviando datos al AuthController:', formData);

                // ✅ AHORA USA EL ENDPOINT CORRECTO DEL AUTHCONTROLLER
                const response = await fetch('/registro', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams(formData).toString()
                });

                // El AuthController redirige después del registro
                if (response.redirected) {
                    window.location.href = response.url;
                    return;
                }

                // Si no hay redirección, ver el contenido
                const responseText = await response.text();

                if (response.ok) {
                    showAlert('¡Usuario registrado exitosamente!', 'success');
                    setTimeout(() => {
                        window.location.href = '/login?registroExitoso=true';
                    }, 2000);
                } else {
                    // Buscar mensaje de error en el HTML
                    const errorMatch = responseText.match(/<div class="alert alert-danger">(.*?)<\/div>/);
                    const errorMsg = errorMatch ? errorMatch[1] : 'Error al registrar usuario';
                    throw new Error(errorMsg);
                }

            } catch (error) {
                console.error('Error:', error);
                showAlert(error.message, 'error');
            } finally {
                setLoading(false);
            }
        });

        function validateField(field) {
            const value = field.value.trim();

            if (field.hasAttribute('required') && !value) {
                field.classList.add('is-invalid');
                field.classList.remove('is-valid');
                return false;
            }

            if (field.type === 'email' && value) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(value)) {
                    field.classList.add('is-invalid');
                    field.classList.remove('is-valid');
                    return false;
                }
            }

            field.classList.remove('is-invalid');
            field.classList.add('is-valid');
            return true;
        }

        function setLoading(loading) {
            if (loading) {
                submitBtn.disabled = true;
                submitSpinner.classList.remove('d-none');
                submitText.textContent = 'Registrando...';
            } else {
                submitBtn.disabled = false;
                submitSpinner.classList.add('d-none');
                submitText.textContent = 'Crear Cuenta';
            }
        }

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alert-container');
            alertContainer.innerHTML = '';

            const alert = document.createElement('div');
            alert.className = `alert alert-${type === 'error' ? 'danger' : 'success'} alert-dismissible fade show`;
            alert.innerHTML = `
                <div class="d-flex align-items-center">
                    <i class="bi bi-${type === 'error' ? 'exclamation-triangle' : 'check-circle'}-fill me-2"></i>
                    ${message}
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;

            alertContainer.appendChild(alert);
        }
    });
</script>
</body>
</html>
