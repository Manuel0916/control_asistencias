<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predicción de Asistencia por Alumno - AsistControl</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --primary: #4F7BFF;
            --primary-dark: #3A5FDB;
            --primary-light: #EAF0FF;
            --secondary: #8B5CF6;
            --accent: #10B981;
            --accent-dark: #059669;
            --light-bg: #FFFFFF;
            --dark-bg: #0F172A;
            --text-dark: #1E293B;
            --text-muted: #64748B;
            --card-shadow: 0 20px 40px -15px rgba(79, 123, 255, 0.15);
            --card-shadow-hover: 0 30px 60px -20px rgba(79, 123, 255, 0.25);
            --border-light: #E2E8F0;
            --gradient-primary: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            color: var(--text-dark);
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* FONDO ANIMADO */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(45deg, #f8fafc 0%, #f1f5f9 100%);
        }

        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            opacity: 0.1;
            border-radius: 50%;
            background: var(--gradient-primary);
            animation: float 20s infinite linear;
        }

        .shape:nth-child(1) {
            width: 200px;
            height: 200px;
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 150px;
            height: 150px;
            top: 60%;
            right: 10%;
            animation-delay: -5s;
            animation-duration: 25s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
            }
            33% {
                transform: translateY(-30px) rotate(120deg);
            }
            66% {
                transform: translateY(30px) rotate(240deg);
            }
        }

        .prediction-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-light);
            width: 100%;
            max-width: 500px;
            position: relative;
            overflow: hidden;
        }

        .prediction-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--gradient-primary);
        }

        .header-section {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header-icon {
            font-size: 3rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .header-title {
            font-weight: 800;
            font-size: 2rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .header-subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-control, .form-select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            background: var(--light-bg);
            color: var(--text-dark);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 123, 255, 0.1);
        }

        .form-select {
            cursor: pointer;
        }

        .btn-predict {
            background: var(--gradient-primary);
            color: white;
            border: none;
            font-weight: 700;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            transition: all 0.4s ease;
            box-shadow: 0 10px 25px rgba(79, 123, 255, 0.3);
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .btn-predict::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-predict:hover::before {
            left: 100%;
        }

        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(79, 123, 255, 0.4);
        }

        .btn-predict:active {
            transform: translateY(0);
        }

        /* Animaciones */
        .fade-in-up {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stagger-delay-1 { animation-delay: 0.1s; }
        .stagger-delay-2 { animation-delay: 0.2s; }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .prediction-container {
                padding: 2rem 1.5rem;
            }

            .header-title {
                font-size: 1.75rem;
            }
        }

        @media (max-width: 576px) {
            .prediction-container {
                padding: 1.5rem 1rem;
            }

            .header-title {
                font-size: 1.5rem;
            }

            .header-icon {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

<body>
<!-- FONDO ANIMADO -->
<div class="background-animation"></div>
<div class="floating-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
</div>

<div class="prediction-container fade-in-up">
    <div class="header-section">
        <div class="header-icon">
            <i class="bi bi-person-badge"></i>
        </div>
        <h1 class="header-title">Predicción por Alumno</h1>
        <p class="header-subtitle">Análisis personalizado de asistencia</p>
    </div>

    <!-- FORMULARIO ORIGINAL - FUNCIONALIDAD PRESERVADA -->
    <form th:action="@{/asistencia/predict}" method="post" th:object="${asistenciaDto}">

        <div class="form-group fade-in-up stagger-delay-1">
            <label class="form-label">Alumno:</label>
            <select class="form-select" th:field="*{nombre}" required>
                <option value="">Seleccione un alumno...</option>
                <option th:each="n : ${nombres}" th:value="${n}" th:text="${n}"></option>
            </select>
        </div>

        <div class="form-group fade-in-up stagger-delay-1">
            <label class="form-label">Clase:</label>
            <select class="form-select" th:field="*{clase}" required>
                <option value="">Seleccione una clase...</option>
                <option th:each="c : ${clases}" th:value="${c}" th:text="${c}"></option>
            </select>
        </div>

        <div class="form-group fade-in-up stagger-delay-2">
            <label class="form-label">Día de la semana:</label>
            <select class="form-select" th:field="*{diaSemana}" required>
                <option value="">Seleccione un día...</option>
                <option th:each="d : ${dias}" th:value="${d}" th:text="${d}"></option>
            </select>
        </div>

        <div class="form-group fade-in-up stagger-delay-2">
            <label class="form-label">Hora:</label>
            <select class="form-select" th:field="*{hora}" required>
                <option value="">Seleccione una hora...</option>
                <option th:each="h : ${horas}" th:value="${h}" th:text="${h}"></option>
            </select>
        </div>

        <div class="form-group fade-in-up stagger-delay-2">
            <label class="form-label">Mes:</label>
            <select class="form-select" th:field="*{mes}" required>
                <option value="">Seleccione un mes...</option>
                <option th:each="m : ${meses}" th:value="${m}" th:text="${m}"></option>
            </select>
        </div>

        <div class="fade-in-up stagger-delay-2">
            <button type="submit" class="btn-predict">
                <i class="bi bi-calculator me-2"></i>Predecir Asistencia
            </button>
        </div>
    </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Animación simple al cargar
    document.addEventListener('DOMContentLoaded', function() {
        const elements = document.querySelectorAll('.fade-in-up');
        elements.forEach((element, index) => {
            element.style.animationDelay = `${index * 0.1}s`;
        });
    });

    // Efecto hover en el contenedor
    const container = document.querySelector('.prediction-container');
    container.addEventListener('mouseenter', function() {
        this.style.transform = 'translateY(-5px)';
        this.style.boxShadow = 'var(--card-shadow-hover)';
    });

    container.addEventListener('mouseleave', function() {
        this.style.transform = 'translateY(0)';
        this.style.boxShadow = 'var(--card-shadow)';
    });

    // Efectos en los campos del formulario
    document.querySelectorAll('.form-select').forEach(select => {
        select.addEventListener('focus', function() {
            this.style.borderColor = 'var(--primary)';
            this.style.boxShadow = '0 0 0 3px rgba(79, 123, 255, 0.1)';
        });

        select.addEventListener('blur', function() {
            this.style.borderColor = 'var(--border-light)';
            this.style.boxShadow = 'none';
        });
    });
</script>
</body>
</html>
