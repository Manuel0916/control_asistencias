# =====================
# SPRING BOOT GENERAL
# =====================
spring.application.name=control-asistencia

# =====================
# MySQL CONFIGURACI�N
# =====================
spring.datasource.url=jdbc:mysql://localhost:3306/control_asistencia
spring.datasource.username=root
spring.datasource.password=0220

# =====================
# OLLAMA CONFIGURACI�N (CORREGIDO)
# =====================
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=phi3:latest
spring.ai.ollama.chat.options.temperature=0.2
app.ai.negacion='Lo siento, no puedo responder esa pregunta.'

# =====================
# JPA
# =====================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# =====================
# MongoDB CONFIGURACI�N
# =====================
spring.data.mongodb.uri=mongodb://localhost:27017/control_asistencia_mongo

# =====================
# SPRING SECURITY
# =====================
spring.security.user.name=admin
spring.security.user.password=admin

# =====================
# THYMELEAF
# =====================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.check-template-location=true

# =====================
# MULTIPART
# =====================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB