# =====================
# SPRING BOOT GENERAL
# =====================
spring.application.name=control-asistencia

# =====================
# MYSQL (Conexi�n local para JPA)
# =====================
spring.datasource.url=jdbc:mysql://localhost:3306/control_asistencia
spring.datasource.username=root
spring.datasource.password=1234

# =====================
# JPA
# =====================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# =====================
# OLLAMA
# =====================
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2
# Temperatura 0.0 para m�xima precisi�n t�cnica (evita alucinaciones)
spring.ai.ollama.chat.options.temperature=0.2
# Tiempo de espera aumentado para que Docker alcance a responder
spring.ai.ollama.chat.options.timeout=90s

app.ai.negacion=Lo siento, no puedo responder esa pregunta.

# =====================
# MCP (ACTIVADO PARA DOCKER)
# =====================
# Habilitamos el cliente MCP para que la IA use las herramientas externas
spring.ai.mcp.client.enabled=true
spring.ai.mcp.client.type=ASYNC
# Si quieres que OLLAMA use dbhub autom�ticamente
spring.ai.ollama.chat.options.functions=dbhub,auto
# Ruta al archivo JSON con los comandos de Docker
spring.ai.mcp.client.stdio.servers-configuration=classpath:mcp-servers.json
# Aumentamos el timeout del cliente por si Docker tarda en levantar las im�genes
spring.ai.mcp.client.stdio.timeout=60s

# =====================
# SPRING SECURITY
# =====================
spring.security.user.name=admin
spring.security.user.password=admin

# =====================
# THYMELEAF
# =====================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.check-template-location=true

# =====================
# MULTIPART
# =====================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB